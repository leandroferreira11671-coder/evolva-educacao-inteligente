<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLVA — Educação Inteligente</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:20px;
color:#00e5ff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
background:linear-gradient(45deg,#00e5ff,#00ff88);
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.link{
margin-top:15px;
cursor:pointer;
color:#00e5ff;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>EVOLVA</h1>

<!-- LOGIN -->
<div id="loginBox">
<input type="text" id="loginUser" placeholder="Usuário">
<input type="password" id="loginPass" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div class="link" onclick="mostrarCadastro()">Criar conta</div>
</div>

<!-- CADASTRO -->
<div id="cadastroBox" style="display:none;">
<input type="text" id="cadUser" placeholder="Novo usuário">
<input type="password" id="cadPass" placeholder="Nova senha">
<button onclick="cadastrar()">Cadastrar</button>
<div class="link" onclick="mostrarLogin()">Voltar ao login</div>
</div>

</div>

<script>

/* ===== TROCAR TELAS ===== */

function mostrarCadastro(){
document.getElementById("loginBox").style.display="none";
document.getElementById("cadastroBox").style.display="block";
}

function mostrarLogin(){
document.getElementById("loginBox").style.display="block";
document.getElementById("cadastroBox").style.display="none";
}

/* ===== CADASTRAR ===== */

function cadastrar(){
let user=document.getElementById("cadUser").value.trim();
let pass=document.getElementById("cadPass").value.trim();

if(!user||!pass){
alert("Preencha todos os campos");
return;
}

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

if(usuarios.find(u=>u.user===user)){
alert("Usuário já existe");
return;
}

usuarios.push({
user:user,
pass:btoa(pass),
xp:0,
progresso:{
fonologia:1,
morfologia:1,
sintaxe:1,
semantica:1
}
});

localStorage.setItem("usuarios",JSON.stringify(usuarios));

alert("Conta criada com sucesso!");
mostrarLogin();
}

/* ===== LOGIN ===== */

function login(){
let user=document.getElementById("loginUser").value.trim();
let pass=document.getElementById("loginPass").value.trim();

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

let valido=usuarios.find(u=>u.user===user && u.pass===btoa(pass));

if(!valido){
alert("Usuário ou senha incorretos");
return;
}

localStorage.setItem("usuarioLogado",user);
window.location.href="dashboard.html";
}

</script>

</body>
</html>
