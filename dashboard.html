<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLVA - Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
margin:0;
padding:0;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
color:#00e5ff;
}

.container{
padding:30px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#00e5ff;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<header>

<h1>EVOLVA</h1>

<button onclick="logout()">Sair</button>

</header>

<div class="container">

<h2>Matérias</h2>

<div class="card">

<h3>Português</h3>

<p>Aprenda gramática e interpretação.</p>

<a href="materias/portugues/portugues.html">
<button>Acessar</button>
</a>

</div>

</div>

<script>

let usuario = localStorage.getItem("usuarioLogado");

if(!usuario){

window.location.href="index.html";

}

function logout(){

localStorage.removeItem("usuarioLogado");

window.location.href="index.html";

}

</script>

</body>

</html>
