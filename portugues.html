<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português — EVOLVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:30px;
text-align:center;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.usuario{color:#00e5ff;font-weight:bold;}
.xp{color:#00ff88;font-weight:bold;}
.tempo{color:#ffd700;font-weight:bold;}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00e5ff,#00ff88);
cursor:pointer;
font-weight:bold;
margin:8px;
}

.modulos{
margin-top:20px;
}

.quiz{
margin-top:30px;
display:none;
}

.opcao{
display:block;
margin:10px auto;
padding:12px;
width:260px;
border-radius:8px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
}

.opcao:hover{
background:#00e5ff;
color:black;
}

.correto{background:#00ff88 !important;color:black !important;}
.errado{background:#ff4c4c !important;color:white !important;}

.premium{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.premium-box{
background:#1e2a38;
padding:40px;
border-radius:20px;
width:300px;
}

</style>
</head>

<body>

<div class="topo">
<div class="usuario">Aluno: <span id="nomeUser"></span></div>
<div class="xp">XP: <span id="xp"></span></div>
<div class="tempo">Tempo: <span id="tempo"></span></div>
<button onclick="window.location.href='dashboard.html'">Voltar</button>
</div>

<h1>Português</h1>

<div class="modulos">
<button onclick="abrirModulo('fonologia')">Fonologia e Ortografia</button>
<button onclick="abrirModulo('morfologia')">Morfologia</button>
<button onclick="abrirModulo('sintaxe')">Sintaxe</button>
<button onclick="abrirModulo('semantica')">Semântica e Leitura</button>
</div>

<div class="quiz" id="quiz">
<h3 id="pergunta"></h3>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
</div>

<div class="premium" id="premium">
<div class="premium-box">
<h2>Plano Premium</h2>
<p>Tempo ilimitado</p>
<p>Acesso completo</p>
<button onclick="alert('Pagamento futuro aqui')">Assinar</button>
</div>
</div>

<script>

/* ===== VERIFICAR LOGIN ===== */

let user = localStorage.getItem("usuarioLogado");
if(!user){
window.location.href="index.html";
}

document.getElementById("nomeUser").innerText = user;

/* ===== PEGAR USUÁRIO ===== */

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let usuarioAtual = usuarios.find(u=>u.user===user);

if(!usuarioAtual){
window.location.href="index.html";
}

if(!usuarioAtual.xp) usuarioAtual.xp = 0;
if(!usuarioAtual.tempo) usuarioAtual.tempo = 0;

document.getElementById("xp").innerText = usuarioAtual.xp;

/* ===== CONTROLE DE TEMPO ===== */

const LIMITE = 3 * 60 * 60;
let hoje = new Date().toDateString();

if(usuarioAtual.dataTempo !== hoje){
usuarioAtual.tempo = 0;
usuarioAtual.dataTempo = hoje;
salvarUsuarios();
}

function atualizarTempo(){
let restante = LIMITE - usuarioAtual.tempo;

if(restante <= 0){
document.getElementById("tempo").innerText="Esgotado";
document.getElementById("premium").style.display="flex";
return;
}

let h=Math.floor(restante/3600);
let m=Math.floor((restante%3600)/60);
let s=restante%60;

document.getElementById("tempo").innerText=h+"h "+m+"m "+s+"s";
}

setInterval(()=>{
if(document.getElementById("quiz").style.display==="block"){
usuarioAtual.tempo++;
salvarUsuarios();
}
atualizarTempo();
},1000);

atualizarTempo();

/* ===== BANCO DE PERGUNTAS ===== */

let bancoPerguntas = {

fonologia:[
{
pergunta:"Qual palavra está escrita corretamente?",
opcoes:["Excessão","Exceção","Exsesão","Excessam"],
correta:"Exceção"
}
],

morfologia:[
{
pergunta:"'Correr' é classificado como:",
opcoes:["Substantivo","Verbo","Adjetivo","Advérbio"],
correta:"Verbo"
}
],

sintaxe:[
{
pergunta:"Na frase 'João comprou pão', o sujeito é:",
opcoes:["João","comprou","pão","comprou pão"],
correta:"João"
}
],

semantica:[
{
pergunta:"A palavra 'banco' pode significar instituição financeira ou assento. Isso é:",
opcoes:["Antônimo","Sinonímia","Polissemia","Metáfora"],
correta:"Polissemia"
}
]

};

let moduloAtual;
let perguntaAtual=0;

/* ===== FUNÇÕES QUIZ ===== */

function abrirModulo(modulo){
if(usuarioAtual.tempo >= LIMITE){
document.getElementById("premium").style.display="flex";
return;
}

moduloAtual=modulo;
perguntaAtual=0;
document.getElementById("quiz").style.display="block";
mostrarPergunta();
}

function mostrarPergunta(){
let p=bancoPerguntas[moduloAtual][perguntaAtual];
document.getElementById("pergunta").innerText=p.pergunta;

let botoes=document.querySelectorAll(".opcao");
for(let i=0;i<botoes.length;i++){
botoes[i].innerText=p.opcoes[i];
botoes[i].classList.remove("correto","errado");
botoes[i].disabled=false;
}
}

function responder(botao){
let correta=bancoPerguntas[moduloAtual][perguntaAtual].correta;

if(botao.innerText===correta){
botao.classList.add("correto");
usuarioAtual.xp += 10;
document.getElementById("xp").innerText=usuarioAtual.xp;
salvarUsuarios();
}else{
botao.classList.add("errado");
}

document.querySelectorAll(".opcao").forEach(b=>b.disabled=true);

setTimeout(()=>{
document.getElementById("quiz").style.display="none";
},1000);
}

/* ===== SALVAR ===== */

function salvarUsuarios(){
localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

</script>

</body>
</html>
