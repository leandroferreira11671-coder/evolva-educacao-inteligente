<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português — EVOLVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:30px;
}

.topo{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.voltar{
cursor:pointer;
color:#00e5ff;
}

.xp{
color:#00ff88;
font-weight:bold;
}

.progresso-container{
width:100%;
max-width:500px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:20px;
margin:20px auto;
}

.progresso{
height:100%;
width:0%;
background:linear-gradient(45deg,#00ff88,#00e5ff);
border-radius:20px;
transition:.3s;
}

.quiz{
margin-top:40px;
display:none;
animation:fade .4s ease-in-out;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.pergunta{
font-size:20px;
margin-bottom:20px;
}

.opcao{
display:block;
margin:10px auto;
padding:12px;
width:250px;
border-radius:8px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
transition:.3s;
}

.opcao:hover{
background:#00e5ff;
color:black;
}

.correto{
background:#00ff88 !important;
color:black !important;
}

.errado{
background:#ff4c4c !important;
color:white !important;
}

.niveis{
margin-top:40px;
}

.nivel-btn{
padding:12px 25px;
border-radius:8px;
border:none;
background:linear-gradient(45deg,#00e5ff,#00ff88);
cursor:pointer;
font-weight:bold;
}

footer{
margin-top:40px;
opacity:.6;
}
</style>
</head>

<body>

<div class="topo">
<div class="voltar" onclick="window.location.href='index.html'">⬅ Voltar</div>
<div class="xp">XP: <span id="xp">0</span></div>
</div>

<h1>Português</h1>

<div class="progresso-container">
<div class="progresso" id="barra"></div>
</div>

<div class="niveis">
<button class="nivel-btn" onclick="iniciarQuiz()">Iniciar Nível 1</button>
</div>

<div class="quiz" id="quiz">
<div class="pergunta" id="pergunta"></div>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
</div>

<footer>EVOLVA — Educação Inteligente</footer>

<script>
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
document.getElementById("xp").innerText = xp;

let perguntas = [
{
pergunta:"Qual é o plural de 'cidadão'?",
opcoes:["Cidadões","Cidadãos","Cidadães","Cidadans"],
correta:"Cidadãos"
},
{
pergunta:"Qual frase está correta?",
opcoes:["A gente vamos sair.","A gente vai sair.","A gente vão sair.","A gente iremos sair."],
correta:"A gente vai sair."
},
{
pergunta:"Qual é um substantivo?",
opcoes:["Correr","Bonito","Casa","Rapidamente"],
correta:"Casa"
}
];

let perguntaAtual = 0;

function iniciarQuiz(){
document.querySelector(".quiz").style.display="block";
mostrarPergunta();
}

function mostrarPergunta(){
let p = perguntas[perguntaAtual];
document.getElementById("pergunta").innerText = p.pergunta;

let botoes = document.querySelectorAll(".opcao");
for(let i=0;i<botoes.length;i++){
botoes[i].innerText = p.opcoes[i];
botoes[i].classList.remove("correto","errado");
botoes[i].disabled=false;
}
}

function responder(botao){
let resposta = botao.innerText;
let correta = perguntas[perguntaAtual].correta;

let botoes = document.querySelectorAll(".opcao");

if(resposta === correta){
botao.classList.add("correto");
xp += 10;
localStorage.setItem("xp",xp);
document.getElementById("xp").innerText = xp;
document.getElementById("barra").style.width = (xp % 100) + "%";
}else{
botao.classList.add("errado");
}

botoes.forEach(b=>b.disabled=true);

setTimeout(()=>{
perguntaAtual++;
if(perguntaAtual < perguntas.length){
mostrarPergunta();
}else{
alert("Nível concluído! 🚀");
document.querySelector(".quiz").style.display="none";
perguntaAtual=0;
}
},1000);
}
</script>

</body>
</html>
