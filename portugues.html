<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português — EVOLVA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Arial;
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:30px;
text-align:center;
overflow-x:hidden;
}

/* 🔥 LOGO GIGANTE COMO FUNDO */
.fundo-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:140vw;          /* ocupa quase a tela inteira */
opacity:0.03;         /* bem suave */
z-index:-1;
pointer-events:none;
}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.usuario{
color:#00e5ff;
font-weight:bold;
}

.xp{
color:#00ff88;
font-weight:bold;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
margin:8px;
font-weight:bold;
}

.modulo-btn{
background:#00e5ff;
color:black;
}

.nivel-btn{
background:#00ff88;
color:black;
}

.nivel-btn.locked{
background:gray;
cursor:not-allowed;
}

.quiz{
margin-top:30px;
display:none;
}

.opcao{
display:block;
margin:10px auto;
padding:12px;
width:260px;
border-radius:8px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
}

.opcao:hover{
background:#00e5ff;
color:black;
}

.progress-container{
width:80%;
margin:20px auto;
background:#1e2a38;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:20px;
width:0%;
background:#00ff88;
transition:0.3s;
}
</style>
</head>

<body>

<!-- 🔥 LOGO DE FUNDO -->
<img src="logo.jpeg" class="fundo-logo">

<div class="topo">
<div class="usuario">Aluno: <span id="nomeUser"></span></div>
<div class="xp">XP: <span id="xp"></span></div>
<button onclick="window.location.href='dashboard.html'">Voltar</button>
</div>

<h1>Português</h1>

<div id="modulos"></div>
<div id="niveis"></div>

<div class="quiz" id="quiz">
<h3 id="pergunta"></h3>

<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>
</div>

<script src="perguntas-portugues.js"></script>

<script>

let user = localStorage.getItem("usuarioLogado");
if(!user){ window.location.href="index.html"; }

document.getElementById("nomeUser").innerText=user;

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let usuarioAtual = usuarios.find(u=>u.user===user);

if(!usuarioAtual.progresso){
usuarioAtual.progresso={
fonologia:1,
morfologia:1,
sintaxe:1,
semantica:1
};
}

if(!usuarioAtual.xp) usuarioAtual.xp=0;
document.getElementById("xp").innerText=usuarioAtual.xp;

let modulosLista=["fonologia","morfologia","sintaxe","semantica"];
let modulosDiv=document.getElementById("modulos");

modulosLista.forEach(mod=>{
let btn=document.createElement("button");
btn.innerText=mod.toUpperCase();
btn.className="modulo-btn";
btn.onclick=()=>mostrarNiveis(mod);
modulosDiv.appendChild(btn);
});

let moduloAtual;
let nivelAtual;
let perguntaAtual=0;

function mostrarNiveis(modulo){
moduloAtual=modulo;
document.getElementById("niveis").innerHTML="";

for(let i=1;i<=3;i++){
let btn=document.createElement("button");
btn.innerText="Nível "+i;
btn.className="nivel-btn";

if(i>usuarioAtual.progresso[modulo]){
btn.classList.add("locked");
btn.disabled=true;
}else{
btn.onclick=()=>iniciarNivel(i);
}

document.getElementById("niveis").appendChild(btn);
}
}

function iniciarNivel(nivel){
nivelAtual="nivel"+nivel;
perguntaAtual=0;
document.getElementById("quiz").style.display="block";
mostrarPergunta();
}

function mostrarPergunta(){

let perguntas=bancoPerguntas[moduloAtual][nivelAtual];

if(!perguntas || perguntas.length===0){
alert("Esse nível ainda não possui perguntas.");
return;
}

if(perguntaAtual>=perguntas.length){
finalizarNivel();
return;
}

let p=perguntas[perguntaAtual];

document.getElementById("pergunta").innerText=p.pergunta;

let botoes=document.querySelectorAll(".opcao");

for(let i=0;i<botoes.length;i++){
botoes[i].innerText=p.opcoes[i];
botoes[i].disabled=false;
}

atualizarBarra();
}

function responder(botao){
let correta=bancoPerguntas[moduloAtual][nivelAtual][perguntaAtual].correta;

if(botao.innerText===correta){
usuarioAtual.xp+=5;
document.getElementById("xp").innerText=usuarioAtual.xp;
salvar();
}

perguntaAtual++;
mostrarPergunta();
}

function atualizarBarra(){
let total=bancoPerguntas[moduloAtual][nivelAtual].length;
let porcentagem=(perguntaAtual/total)*100;
document.getElementById("progress").style.width=porcentagem+"%";
}

function finalizarNivel(){
alert("Nível concluído!");

let nivelNumero=parseInt(nivelAtual.replace("nivel",""));

if(usuarioAtual.progresso[moduloAtual]===nivelNumero){
usuarioAtual.progresso[moduloAtual]++;
}

salvar();
document.getElementById("quiz").style.display="none";
mostrarNiveis(moduloAtual);
}

function salvar(){
localStorage.setItem("usuarios",JSON.stringify(usuarios));
}

</script>

</body>
  </html>
