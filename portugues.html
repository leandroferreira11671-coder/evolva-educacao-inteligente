<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português — EVOLVA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:30px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.voltar{cursor:pointer;color:#00e5ff;}
.xp{color:#00ff88;font-weight:bold;}
.tempo{color:#ffd700;font-weight:bold;}

.progresso-container{
width:100%;
max-width:500px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:20px;
margin:20px auto;
}

.progresso{
height:100%;
width:0%;
background:linear-gradient(45deg,#00ff88,#00e5ff);
border-radius:20px;
transition:.3s;
}

.quiz{
margin-top:30px;
display:none;
}

.pergunta{
font-size:20px;
margin-bottom:20px;
}

.opcao{
display:block;
margin:10px auto;
padding:12px;
width:260px;
border-radius:8px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
transition:.3s;
}

.opcao:hover{
background:#00e5ff;
color:black;
}

.correto{
background:#00ff88 !important;
color:black !important;
}

.errado{
background:#ff4c4c !important;
color:white !important;
}

.nivel-btn{
margin-top:20px;
padding:12px 25px;
border-radius:8px;
border:none;
background:linear-gradient(45deg,#00e5ff,#00ff88);
cursor:pointer;
font-weight:bold;
}

/* PREMIUM */

.premium{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

.premium-box{
background:#1e2a38;
padding:40px;
border-radius:20px;
width:300px;
}

.premium-box h2{
color:#00ff88;
margin-bottom:20px;
}

.premium-box button{
margin-top:20px;
padding:12px 25px;
border-radius:8px;
border:none;
background:linear-gradient(45deg,#00ff88,#00e5ff);
cursor:pointer;
font-weight:bold;
}

footer{
margin-top:40px;
opacity:.6;
}
</style>
</head>

<body>

<div class="topo">
<div class="voltar" onclick="window.location.href='index.html'">⬅ Voltar</div>
<div class="xp">XP: <span id="xp">0</span></div>
<div class="tempo">Tempo restante: <span id="tempo"></span></div>
</div>

<h1>Português</h1>

<div class="progresso-container">
<div class="progresso" id="barra"></div>
</div>

<button class="nivel-btn" onclick="iniciarQuiz()" id="btnIniciar">
Iniciar Nível 1
</button>

<div class="quiz" id="quiz">
<div class="pergunta" id="pergunta"></div>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
<button class="opcao" onclick="responder(this)"></button>
</div>

<div class="premium" id="premium">
<div class="premium-box">
<h2>Plano Premium</h2>
<p>Tempo ilimitado</p>
<p>Acesso total aos cursos</p>
<p>Sem limites diários</p>
<button onclick="alert('Aqui futuramente entra pagamento real')">
Assinar Agora
</button>
</div>
</div>

<footer>EVOLVA — Educação Inteligente</footer>

<script>
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
document.getElementById("xp").innerText = xp;

const LIMITE = 3 * 60 * 60;
let hoje = new Date().toDateString();
let dataSalva = localStorage.getItem("dataTempo");

if(dataSalva !== hoje){
localStorage.setItem("tempoUsado",0);
localStorage.setItem("dataTempo",hoje);
}

let tempoUsado = parseInt(localStorage.getItem("tempoUsado")) || 0;

function atualizarTempo(){
let restante = LIMITE - tempoUsado;

if(restante <= 0){
document.getElementById("tempo").innerText="Tempo esgotado";
document.getElementById("btnIniciar").disabled=true;
document.getElementById("premium").style.display="flex";
return;
}

let h=Math.floor(restante/3600);
let m=Math.floor((restante%3600)/60);
let s=restante%60;

document.getElementById("tempo").innerText=h+"h "+m+"m "+s+"s";
}

setInterval(()=>{
if(document.getElementById("quiz").style.display==="block"){
tempoUsado++;
localStorage.setItem("tempoUsado",tempoUsado);
}
atualizarTempo();
},1000);

atualizarTempo();

let perguntas=[
{pergunta:"Qual é o plural de 'cidadão'?",
opcoes:["Cidadões","Cidadãos","Cidadães","Cidadans"],
correta:"Cidadãos"}
];

let perguntaAtual=0;

function iniciarQuiz(){
if(tempoUsado>=LIMITE){
document.getElementById("premium").style.display="flex";
return;
}
document.getElementById("quiz").style.display="block";
mostrarPergunta();
}

function mostrarPergunta(){
let p=perguntas[perguntaAtual];
document.getElementById("pergunta").innerText=p.pergunta;

let botoes=document.querySelectorAll(".opcao");
for(let i=0;i<botoes.length;i++){
botoes[i].innerText=p.opcoes[i];
botoes[i].classList.remove("correto","errado");
botoes[i].disabled=false;
}
}

function responder(botao){
if(botao.innerText===perguntas[perguntaAtual].correta){
botao.classList.add("correto");
xp+=10;
localStorage.setItem("xp",xp);
document.getElementById("xp").innerText=xp;
}
else{
botao.classList.add("errado");
}

document.querySelectorAll(".opcao").forEach(b=>b.disabled=true);

setTimeout(()=>{
document.getElementById("quiz").style.display="none";
},1000);
}
</script>

</body>
</html>
