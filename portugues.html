<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português — EVOLVA</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.card {
    background:#1e2a38;
    padding:30px;
    border-radius:15px;
    width:250px;
    margin:20px auto;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

.locked {
    opacity:0.5;
}
</style>
</head>

<body>

<h1>📘 Português</h1>
<p>Escolha seu nível</p>

<div class="card">
    <h3>🟢 Básico</h3>
    <p>Fundamentos da língua portuguesa</p>
    <button>Entrar</button>
</div>

<div class="card locked">
    <h3>🔒 Intermediário</h3>
    <p>Em breve</p>
    <button disabled>Bloqueado</button>
</div>

<div class="card locked">
    <h3>🔒 Avançado</h3>
    <p>Em breve</p>
    <button disabled>Bloqueado</button>
</div>

</body>
</html>
